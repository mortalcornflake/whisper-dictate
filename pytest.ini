[pytest]
# Only collect the real unit tests. test_transcription.py / check_setup.py at the
# repo root are manual, interactive smoke-test scripts, not pytest suites.
testpaths = tests
# Put the repo root on sys.path so tests/ can import the top-level modules
# (dictate, faster_whisper_backend) under a plain `pytest` invocation — not just
# `python -m pytest`, which CI does not use.
pythonpath = .
